<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>Student Registration</title>

        <!-- Bootstrap CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

        <!-- Custom CSS -->
        <link rel="stylesheet" href="../css/style.css">

    </head>

    <body class="bg-light">
        <div class="container my-5">
            <div class="row justify-content-center">
                <div class="col-lg-8 col-md-10">
                    <div class="card shadow-sm">
                        <div class="card-header text-center">

                            <h3 class="mb-1">
                            Student Registration
                            </h3>

                            <p class="mb-0">
                            Complete the form below to create your student account.
                            </p>
                        </div>

                        <div class="card-body">

                            <form id="registrationForm" action="welcome.html" novalidate>

                                <div class="row">

                                    <!-- First Name -->
                                    <div class="col-md-6 mb-3">

                                        <label class="form-label">
                                        First Name
                                        </label>

                                        <input
                                        type="text"
                                        class="form-control"
                                        id="firstName"
                                        name="firstName"
                                        placeholder="Enter first name">

                                        <div id="firstNameError" class="text-danger small"></div>

                                    </div>

                                    <!-- Last Name -->

                                    <div class="col-md-6 mb-3">

                                        <label class="form-label">
                                        Last Name
                                        </label>

                                        <input
                                        type="text"
                                        class="form-control"
                                        id="lastName"
                                        name="lastName"
                                        placeholder="Enter last name">

                                        <div id="lastNameError" class="text-danger small"></div>

                                    </div>

                                    <!-- DOB -->

                                    <div class="col-md-6 mb-3">

                                        <label class="form-label">
                                        Date of Birth
                                        </label>

                                        <input
                                        type="date"
                                        class="form-control"
                                        id="dob"
                                        name="dob">

                                        <div id="dobError" class="text-danger small"></div>

                                    </div>


                                    <!-- Email -->
                                    <div class="col-md-6 mb-3">

                                        <label class="form-label">
                                        Email
                                        </label>

                                        <input
                                        type="email"
                                        class="form-control"
                                        id="email"
                                        name="email"
                                        placeholder="Enter email">

                                        <div id="emailError" class="text-danger small"></div>

                                    </div>

                                    <!-- Mobile -->

                                    <div class="col-md-6 mb-3">

                                        <label class="form-label">
                                        Mobile Number
                                        </label>

                                        <input
                                        type="tel"
                                        class="form-control"
                                        id="mobile"
                                        name="mobile"
                                        placeholder="Enter mobile number">

                                        <div id="mobileError" class="text-danger small"></div>

                                    </div>

                                    <!-- Password -->

                                    <div class="col-md-6 mb-3">

                                        <label class="form-label">
                                        Password
                                        </label>

                                        <div class="input-group">

                                            <input
                                            type="password"
                                            class="form-control"
                                            id="password"
                                            name="password"
                                            placeholder="Enter password">

                                            <button 
                                            type="button" 
                                            class="btn btn-outline-secondary" 
                                            id="showPassword">
                                                Show
                                            </button>
                                        
                                        </div>

                                        <div id="passwordError" class="text-danger small"></div>

                                    </div>

                                    <!-- Confirm Password -->

                                    <div class="col-md-6 mb-3">

                                        <label class="form-label">
                                        Confirm Password
                                        </label>

                                        <div class="input-group">

                                            <input
                                            type="password"
                                            class="form-control"
                                            id="confirmPassword"
                                            name="confirmPassword"
                                            placeholder="Re-enter password">

                                            <button 
                                            type="button" 
                                            class="btn btn-outline-secondary" 
                                            id="showConfirmPassword">
                                                Show
                                            </button>

                                        </div>

                                        <div id="confirmPasswordError" class="text-danger small"></div>

                                     </div>

                                    <!-- Security Question -->

                                    <div class="col-md-6 mb-3">

                                        <label class="form-label">
                                        Security Question
                                        </label>

                                        <select
                                        class="form-select"
                                        id="securityQuestion"
                                        name="securityQuestion">

                                            <option value="">
                                            Select a question
                                            </option>

                                            <option value="colour">
                                            What is your favourite colour?
                                            </option>

                                            <option value="city">
                                            What is your birth city?
                                            </option>

                                            <option value="pet">
                                            What is your pet's name?
                                            </option>

                                        </select>


                                        <div id="securityQuestionError" class="text-danger small"></div>
                                    </div>

                                    <!-- Security Answer -->

                                    <div class="col-md-12 mb-3">

                                        <label class="form-label">
                                        Security Answer
                                        </label>

                                        <input
                                        type="text"
                                        class="form-control"
                                        id="securityAnswer"
                                        name="securityAnswer"
                                        placeholder="Enter your answer">

                                        <div id="securityAnswerError" class="text-danger small"></div>

                                    </div>
                                
                                    <!-- Profile Photo -->

                                    <div class="col-md-12 mb-3">

                                        <label class="form-label">
                                        Profile Photo
                                        </label>

                                        <input
                                        type="file"
                                        class="form-control"
                                        id="profilePhoto"
                                        name="profilePhoto"
                                        accept=".jpg,.jpeg,.png">

                                        <div id="profilePhotoError" class="text-danger small"></div>

                                    </div>

                                    <!-- Buttons -->

                                    <div class="d-flex justify-content-center gap-3 mt-4">

                                        <button
                                        type="submit"
                                        class="btn btn-primary">
                                        Register
                                        </button>

                                        <button
                                        type="reset"
                                        class="btn btn-secondary">
                                        Reset
                                        </button>

                                        <a
                                        href="../../index.html"
                                        class="btn btn-outline-dark">
                                        Back
                                        </a>

                                    </div>

                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <script src="../js/registration.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
